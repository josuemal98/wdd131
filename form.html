<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Review Form</title>
    <meta name="author" content="Josue Maldonado">
    <meta name="description" content="Product review form for Wasatch Performance Coatings. Leave your opinion here.">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>

    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            
            <div class="form-group">
                <label for="product-name">Product Name *</label>
                <select id="product-name" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>
            </div>

           <div class="form-group">
                <label>Overall Rating *</label>
                <div class="rating-box">
                    <div class="rating-item">
                        <label for="rate-1">☆</label>
                        <input type="radio" id="rate-1" name="rating" value="1" required>
                    </div>
                    <div class="rating-item">
                        <label for="rate-2">☆☆</label>
                        <input type="radio" id="rate-2" name="rating" value="2" required>
                    </div>
                    <div class="rating-item">
                        <label for="rate-3">☆☆☆</label>
                        <input type="radio" id="rate-3" name="rating" value="3" required>
                    </div>
                    <div class="rating-item">
                        <label for="rate-4">☆☆☆☆</label>
                        <input type="radio" id="rate-4" name="rating" value="4" required>
                    </div>
                    <div class="rating-item">
                        <label for="rate-5">☆☆☆☆☆</label>
                        <input type="radio" id="rate-5" name="rating" value="5" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="install-date">Date of Installation *</label>
                <input type="date" id="install-date" name="installDate" required>
            </div>

          <div class="form-group">
                <label>Which features did you find useful in the product?</label>
                <span class="sub-label">(Check all that apply)</span>
                <div class="checkbox-list">
                    <div class="check-item">
                        <input type="checkbox" id="feat-durability" name="features" value="durability">
                        <label for="feat-durability">Durability</label>
                    </div>
                    <div class="check-item">
                        <input type="checkbox" id="feat-easy" name="features" value="easy">
                        <label for="feat-easy">Easy of Use</label>
                    </div>
                    <div class="check-item">
                        <input type="checkbox" id="feat-performance" name="features" value="performance">
                        <label for="feat-performance">Performance</label>
                    </div>
                    <div class="check-item">
                        <input type="checkbox" id="feat-design" name="features" value="design">
                        <label for="feat-design">Design</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="written-review">Written Review <span class="optional">(Optional)</span></label>
                <textarea id="written-review" name="writtenReview" rows="5"></textarea>
            </div>

            <div class="form-group">
                <label for="user-name">Your Name <span class="optional">(Optional)</span></label>
                <input type="text" id="user-name" name="userName">
            </div>

            <input type="submit" value="Post Review" class="btn">

        </form>
    </main>

  <footer>
    <p>&copy; <span id="currentyear">2026</span> 🏔️ Josue Maldonado 🏔️ Herriman, Utah</p>
    <p>Last Modified: <span id="lastModified"></span></p>
  </footer>

</body>
</html>
